name: Backend CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Instalar Pipenv y dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        pipenv install --dev

    - name: Ejecutar tests y control de calidad
      run: |
        pipenv run pytest