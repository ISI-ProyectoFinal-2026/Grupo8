name: Backend CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: usuario_admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: camping_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13.7"

    - name: Instalar Pipenv y dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        pipenv install --dev

    - name: Ejecutar tests y control de calidad
      run: |
        pipenv run python security/generate_keys.py
        [ -f ../.env ] && cp ../.env .env || true
        echo 'DATABASE_URL="postgresql://usuario_admin:admin123@localhost:5435/camping_db"' >> .env
        pipenv run python -m pytest