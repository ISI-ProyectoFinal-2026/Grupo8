name: Frontend CI

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'frontend/pwa-acceso/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/pwa-acceso

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Compilar el proyecto (Validación de Typescript)
      run: npm run build

    - name: Ejecutar tests (Vitest)
      run: npm run test